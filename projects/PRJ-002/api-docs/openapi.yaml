openapi: 3.1.0
info:
  title: PRJ-002 PDF帳票データ抽出 API
  description: |
    PDF帳票からOCR/VLM技術を活用してデータを自動抽出する外部連携API。
    デスクトップクライアント等からの利用を想定。

    ## 認証
    全てのAPIリクエストに `X-API-Key` ヘッダーが必要です。
    APIキーはWeb管理画面（`/api/data/api-keys`）から発行できます。

    ## レート制限
    テナント単位で30リクエスト/分。
    制限超過時は `429 Too Many Requests` を返却します。

    ## Webhook署名検証
    Webhook通知には `X-Webhook-Signature` ヘッダーが付与されます。
    署名形式: `sha256={hex}` （HMAC-SHA256）
    署名対象: `{X-Webhook-Timestamp}.{body}`

    検証コード例:
    ```python
    import hmac, hashlib
    expected = hmac.new(
        secret.encode(), f"{timestamp}.{body}".encode(), hashlib.sha256
    ).hexdigest()
    assert signature == f"sha256={expected}"
    ```
  version: 1.0.0
  contact:
    name: 開発チーム

servers:
  - url: /api/v1
    description: API v1

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: APIキー（`pk_` プレフィックス付き）

  schemas:
    ExtractionResult:
      type: object
      properties:
        id:
          type: string
          description: 結果ID
        jobId:
          type: string
        fileName:
          type: string
        columnName:
          type: string
          description: 論理カラム名
        columnPhysicalName:
          type: string
          description: 物理カラム名
        rawValue:
          type: string
          description: 抽出された生値
        editedValue:
          type: string
          nullable: true
          description: 編集後の値
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: 信頼度スコア (0.0-1.0)
        engine:
          type: string
          description: 使用した抽出エンジン名
        processingTimeMs:
          type: integer
          description: 処理時間（ミリ秒）
        isTableRow:
          type: boolean
          description: テーブル行データか
        tableRowIndex:
          type: integer
          nullable: true
          description: テーブル行インデックス

    Template:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        extractionType:
          type: string
          enum: [FIELD, TABLE, BOTH]
        fieldCount:
          type: integer
        hasTableRegion:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Job:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        templateId:
          type: string
        templateName:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, SUCCEEDED, PARTIAL, FAILED, CANCELLED]
        totalFiles:
          type: integer
        completedFiles:
          type: integer
        failedFiles:
          type: integer
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        description:
          type: string
        events:
          type: array
          items:
            type: string
            enum: ['*', job.completed, job.failed, job.partial]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
          description: エラーメッセージ

paths:
  /templates:
    get:
      summary: テンプレート一覧取得
      description: APIキーに紐づくテナントのテンプレート一覧を返却する。
      parameters:
        - name: includeShared
          in: query
          schema:
            type: boolean
            default: true
          description: 共有テンプレートを含めるか
      responses:
        '200':
          description: テンプレート一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
        '401':
          description: 認証エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /extract:
    post:
      summary: 単一PDF抽出（同期）
      description: |
        1つのPDFファイルを受け取り、即座に抽出結果を返却する。
        処理完了まで待機するため、大きなPDFの場合はレスポンスに時間がかかる。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [templateId, pdfBase64]
              properties:
                templateId:
                  type: string
                  description: 使用するテンプレートID
                pdfBase64:
                  type: string
                  format: byte
                  description: Base64エンコードされたPDFファイル
                fileName:
                  type: string
                  default: uploaded.pdf
                  description: 元ファイル名
                saveResults:
                  type: boolean
                  default: false
                  description: 結果をDBに保存するか
      responses:
        '200':
          description: 抽出結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  fileName:
                    type: string
                  templateId:
                    type: string
                  templateName:
                    type: string
                  status:
                    type: string
                    enum: [SUCCEEDED, PARTIAL, FAILED]
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExtractionResult'
                  summary:
                    type: object
                    properties:
                      totalFields:
                        type: integer
                      succeededFields:
                        type: integer
                      failedFields:
                        type: integer
                      processingTimeMs:
                        type: integer
        '400':
          description: バリデーションエラー
        '401':
          description: 認証エラー
        '429':
          description: レートリミット超過

  /batch:
    post:
      summary: バッチ抽出（複数PDF）
      description: |
        複数のPDFファイルを一括処理する。
        ジョブとして結果がDBに保存される。最大20ファイル。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [templateId, files]
              properties:
                templateId:
                  type: string
                files:
                  type: array
                  maxItems: 20
                  items:
                    type: object
                    required: [pdfBase64, fileName]
                    properties:
                      pdfBase64:
                        type: string
                        format: byte
                      fileName:
                        type: string
                jobName:
                  type: string
                  description: ジョブ名（省略時は自動生成）
      responses:
        '201':
          description: バッチ処理結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  status:
                    type: string
                    enum: [SUCCEEDED, PARTIAL, FAILED]
                  totalFiles:
                    type: integer
                  completedFiles:
                    type: integer
                  failedFiles:
                    type: integer
                  processingTimeMs:
                    type: integer
                  fileResults:
                    type: array
                    items:
                      type: object
                      properties:
                        fileName:
                          type: string
                        status:
                          type: string
                        resultCount:
                          type: integer
        '400':
          description: バリデーションエラー
        '429':
          description: レートリミット超過

  /jobs/{id}:
    get:
      summary: ジョブステータス確認
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ジョブ情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    $ref: '#/components/schemas/Job'
        '404':
          description: ジョブが見つからない

  /jobs/{id}/results:
    get:
      summary: 抽出結果取得
      description: JSON形式またはCSV形式で結果を取得する。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
        - name: encoding
          in: query
          description: CSV時のエンコーディング
          schema:
            type: string
            enum: [utf-8-bom, utf-8, shift_jis]
            default: utf-8-bom
        - name: delimiter
          in: query
          description: CSV時の区切り文字
          schema:
            type: string
            enum: [comma, tab, semicolon]
            default: comma
        - name: mergeTableRows
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 抽出結果（JSON or CSVファイル）
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  totalResults:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExtractionResult'
            text/csv:
              schema:
                type: string
                format: binary

  /webhooks:
    get:
      summary: Webhookエンドポイント一覧
      responses:
        '200':
          description: エンドポイント一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookEndpoint'
    post:
      summary: Webhookエンドポイント登録
      description: |
        secretは自動生成され、作成レスポンスでのみ返却される。
        テナントあたり最大5つ。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  description: Webhook URL（HTTPS必須）
                description:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                    enum: ['*', job.completed, job.failed, job.partial]
                  default: ['*']
      responses:
        '201':
          description: 作成されたエンドポイント（secretを含む）
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook:
                    $ref: '#/components/schemas/WebhookEndpoint'
                  secret:
                    type: string
                    description: HMAC署名用シークレット（この応答でのみ返却）
    patch:
      summary: Webhookエンドポイント更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                url:
                  type: string
                  format: uri
                description:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: 更新されたエンドポイント
    delete:
      summary: Webhookエンドポイント削除
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 削除成功
